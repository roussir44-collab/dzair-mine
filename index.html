<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dzair Mine</title>
  <meta name="description" content="Dzair Mine Telegram Mini App launch page" />
  <style>
    :root{--bg:#08100f;--card:#0c1715;--text:#edf8f3;--muted:#98aaa2;--line:rgba(108,242,185,.16);--green:#6cf2b9}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%}
    body{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top, rgba(55,208,170,.14), transparent 28%), linear-gradient(180deg,var(--bg), #060b0a);font-family:Arial,sans-serif;color:var(--text)}
    .card{width:min(92vw,720px);padding:28px 24px;text-align:center;background:linear-gradient(180deg, rgba(16,31,27,.95), rgba(10,18,16,.98));border:1px solid var(--line);border-radius:28px;box-shadow:0 22px 60px rgba(0,0,0,.42)}
    .icon{width:min(72vw,280px);height:auto;display:block;margin:0 auto 18px;filter:drop-shadow(0 14px 24px rgba(0,0,0,.35))}
    h1{margin:10px 0 8px;font-size:clamp(32px,5vw,44px);letter-spacing:.01em}
    p{margin:0;color:var(--muted);font-size:clamp(16px,2.5vw,18px)}
    .pill{display:inline-block;margin-top:18px;padding:10px 16px;border-radius:999px;background:rgba(55,208,170,.12);border:1px solid rgba(55,208,170,.18);color:var(--text);font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    .btn{display:inline-block;margin-top:22px;padding:14px 22px;border-radius:16px;text-decoration:none;color:#041611;background:linear-gradient(135deg,var(--green),#9af0c8);font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <img class="icon" src="dzair-mine-logo-icon.png" alt="Dzair Mine logo">
    <h1>Dzair Mine</h1>
    <p>Mine • Earn • Invite • Withdraw</p>
    <div class="pill">Telegram Mini App</div>
    <div><a class="btn" href="#">Open App</a></div>
  </main>
</body>
</html>
